# Variants for DraftAndEditWorkflow.
#
# Read by /rumil-versus-iterate. For each entry, the iterate skill
# fires one rumil-versus-complete invocation, parallelized across
# variants. Output rows land in versus_texts tagged with the
# variant's source_id (auto-derived from the workflow's fingerprint),
# so trace+fork analysis can compare variants directly.
#
# Each variant maps to constructor kwargs for DraftAndEditWorkflow
# + CLI flags on versus/scripts/run_completions.py (via
# --orch draft_and_edit and the --workflow-arg passthrough).
# Path overrides are resolved relative to the repo root.

variants:
  - name: baseline
    description: |
      All defaults — sonnet drafter/critic/editor, built-in prompts,
      n_critics=2, max_rounds unset (budget-bounded). Reference point.
    budget: 4

  - name: harsher_critic
    description: |
      Replaces the critic prompt with one that biases harder against
      generic prose, AI tells, and hedging vocabulary. Tests whether
      tougher critique drives more substantive editor revisions
      without flipping into incoherent over-correction.
    budget: 4
    critic_prompt_path: .claude/skills/rumil-versus-iterate/prompts/draft_and_edit/critic_harsher.md

  - name: n_critics_3
    description: |
      Bumps n_critics from default 2 to 3. Tests whether a third
      independent critique surfaces issues the first two miss, or
      just dilutes signal with redundancy.
    budget: 5  # one extra round to absorb the extra critic
    n_critics: 3

  - name: multi_concern_critic
    description: |
      Replaces the critic prompt with a dimension-sectioned variant
      that produces critique structured by four concerns: structural
      commitment (spine + cue honoring), length fit (symmetric — flags
      undershoot AND overshoot), concreteness/citation density (paradigm
      cases, named referents, quantitative claims), and voice match.
      Tests whether forcing critics to address each dimension explicitly
      makes editor revisions land more cleanly than a free-form critique
      that often privileges one dimension. Round-2 follow-up to the
      §10.3 fork finding that the View was load-bearing for structural
      discipline + paradigm-case content — d&e should iterate the same
      dimensions through its critic loop rather than just borrowing tp's
      pre-cooked View. Round-2 §10.2 showed tp's closer underdelivers on
      long redwood essays; multi-concern critic's symmetric length
      treatment is the d&e analogue of that fix on the closer-input side.
    budget: 4
    critic_prompt_path: .claude/skills/rumil-versus-iterate/prompts/draft_and_edit/critic_multi_concern.md

  - name: v3_planner_arbiter
    description: |
      v3 d&e architecture: drafter is preceded by a planner stage that
      emits a structural brief (spine + section sizing + voice +
      mandatory paradigm-case anchors); critics evaluate against the
      brief; an arbiter stage between critique and edit triages critic
      notes into accept/reject/unresolved; the editor consumes the
      arbitration in place of raw critiques. Combined with the
      multi_concern critic prompt for dimension-sectioned critique.
      Round-3 sweep result on character/aiep/angels: v3 beats every
      prior d&e variant on 3/3 essays, beats human on 2/3 (aiep +
      angels), and is the new d&e default. Still loses to tp b=4 on
      3/3 essays — d&e architectural ceiling vs tp ceiling holds.
      Adds ~6 min wall-clock per run vs multi_concern (planner once,
      arbiter per round) but the prompts here include the round-3
      fixes (mandatory paradigm anchors in planner; arbiter
      reconsider-when-tightened ratchet release) — the unfixed v3
      regressed on character; this fixed v3 is consistently better.
    budget: 4
    with_planner: true
    with_arbiter: true
    critic_prompt_path: .claude/skills/rumil-versus-iterate/prompts/draft_and_edit/critic_multi_concern.md

  - name: v4_audit_anti_tells
    description: |
      v4 d&e: v3 (planner + arbiter + multi_concern critic) plus three
      round-3-iterate-session changes:
      (A.1) Cached-take preamble baked into the multi_concern critic
      prompt — fork-validated round 3 (critic surfaces 4-5 specific
      issues the consolidated multi_concern missed; quote density 3x).
      (A.2) Anti-tells block + length-backstop in the editor prompt:
      `<preserved>` sections must articulate the specific
      argumentative claim that wouldn't survive deletion; per-sentence
      "would deletion change the section's claim?" check; tightening
      from anti-tells must produce a SHORTER revision (the round-3
      fork found the editor articulation improved but length grew —
      this directive constrains).
      (B.3) New brief-audit stage (with_brief_audit=true) fires once
      after round 1's edit. Emits a descriptive audit brief — what
      spine the draft actually has, what anchors actually landed —
      and downstream critic / arbiter / editor see both original and
      audit briefs side-by-side. Round-3 fork found the audit catches
      structural drift the editor + critic provably miss (Section 1
      invented, anchor count doubled vs original).
      Tests whether v3 + these three additive changes meaningfully
      improves vs v3 on character/aiep/angels.
    budget: 4
    with_planner: true
    with_arbiter: true
    with_brief_audit: true
    critic_prompt_path: .claude/skills/rumil-versus-iterate/prompts/draft_and_edit/critic_multi_concern.md
