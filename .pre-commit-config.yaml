repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^deploy/chart/templates/  # Helm templates contain Go-template syntax
      - id: check-toml
      - id: check-json
        exclude: ^frontend/tsconfig\.json$
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs)$
        pass_filenames: false

      - id: generate-api-types
        name: regenerate frontend API types
        entry: ./scripts/generate-api-types.sh
        language: system
        files: ^src/rumil/(api/schemas|models)\.py$
        pass_filenames: false
