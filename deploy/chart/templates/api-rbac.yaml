{{/*
RBAC for the orchestrator-job feature:
- rumil-api SA: bound to the API Deployment, granted permission to create
  and read Jobs (and stream pod logs) in this namespace so the
  /api/jobs/orchestrator-runs endpoint can spawn jobs.
- rumil-orchestrator-job SA: used by the orchestrator pods themselves.
  Intentionally has NO k8s RBAC — orchestrator pods only talk to Supabase
  and external LLM APIs, never to the k8s API. Distinct SA limits blast
  radius.

Both KSAs are annotated for Workload Identity so they can call Vertex AI
as the rumil-vertex-ai GSA. Provision the GSA + WI bindings with
deploy/infra/setup-vertex-ai.sh.

Names are literal (not templated through rumil.fullname) because
src/rumil/k8s/submit.py and deploy/k8s/orchestrator-job.yaml reference them
by name. The chart is only deployed under release name "rumil".
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rumil-api
  labels:
    {{- include "rumil.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    iam.gke.io/gcp-service-account: rumil-vertex-ai@{{ .Values.api.env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rumil-orchestrator-job
  labels:
    {{- include "rumil.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-job
  annotations:
    iam.gke.io/gcp-service-account: rumil-vertex-ai@{{ .Values.api.env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rumil-api-job-manager
  labels:
    {{- include "rumil.labels" . | nindent 4 }}
rules:
  # Submit orchestrator-run Jobs from POST /api/jobs/orchestrator-runs;
  # list them for GET /api/jobs (the job-monitoring UI).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "list"]
  # Read the running rumil-api Deployment to copy image + env onto each Job.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rumil-api-job-manager
  labels:
    {{- include "rumil.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rumil-api-job-manager
subjects:
  - kind: ServiceAccount
    name: rumil-api
    namespace: {{ .Release.Namespace }}
