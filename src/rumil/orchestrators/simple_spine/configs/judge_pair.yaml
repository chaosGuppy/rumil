# judge_pair — SimpleSpine preset for versus pairwise-judging runs.
#
# Library: read (FreeformAgent) → steelman (SampleN n=2) → verdict
# (FreeformAgent). Mainline + role models all default to opus; versus's
# --model flag uniformly overrides via _apply_model_override.
#
# Mainline system prompt extends the default with an explicit
# wire-format constraint listing the seven canonical preference labels.
# Without this, mainline opus rewrites the verdict's correct label into
# non-canonical phrasing on borderline pairs (e.g. "A clearly better"
# instead of "A somewhat preferred"), breaking parse.
#
# Verdict subroutine carries a response_validator that retries when the
# response doesn't end with a canonical label — defends against the
# orthogonal failure mode where the verdict subroutine itself emits a
# numeric scale ("Preference: -2") despite the 7-pt block being in its
# own system prompt.

name: judge_pair
main_model: claude-opus-4-7
main_system_prompt_path: ../prompts/main_default.md
main_system_prompt_extra_path: ../prompts/judge_pair_wire_format.md
max_parallel_spawns_per_turn: 3
# Versus pins these explicitly: the verdict deliverable + canonical
# label fits comfortably under 32k, but mainline finalize may quote
# pair_notes / steelman summaries inline before the label, so we
# match the essay-continuation cap rather than dropping to a smaller
# value. Temperature 1.0 lets mainline plan diverse spawn batches.
mainline_temperature: 1.0
mainline_max_tokens: 32000

subroutines:
  - kind: freeform_agent
    name: pair_notes
    description: |
      Stage 1 of 3 (pair_notes → steelman → verdict).
      Inputs: pair (prefix + both continuations) + rubric in additional_context.
      Output: structured initial reading — what each continuation is doing,
      divergence points, evidence against rubric. NO preference label.
      Use after: feed this back into steelman + verdict via additional_context.
    sys_prompt_path: ../prompts/pair_notes_sys.md
    user_prompt_template: |
      ## Intent
      {intent}

      ## Pair + rubric
      {additional_context}

      Produce the initial read now.
    model: claude-opus-4-7
    max_rounds: 1
    max_tokens: 4096
    overridable: [intent, additional_context, token_cap]
    base_token_cap: 8000
    cost_hint: "≈ 1 opus turn @ 4k out (~5–8k tokens)"
    intent_description: >
      What aspect of the pair to emphasize in the initial read (e.g.
      "focus on argument structure" or just "general"). Free-form.
    additional_context_description: >
      The full pair + rubric: prefix, continuation A, continuation B,
      and the dimension rubric. Spliced under {additional_context}.

  - kind: sample_n
    name: steelman
    description: |
      Stage 2 of 3 (pair_notes → steelman → verdict).
      Inputs: pair + rubric + pair_notes output in additional_context;
      side label ('A' or 'B') in intent.
      Output: N independent steelmans for the chosen side, delimited
      under "## Sample 1", "## Sample 2", …
      Use after: pass both sides' steelmans to verdict.
    sys_prompt_path: ../prompts/steelman_judge_sys.md
    user_prompt_template: |
      ## Intent (which side to steelman)
      {intent}

      ## Pair + rubric + prior read
      {additional_context}

      Produce the steelman now.
    model: claude-sonnet-4-6
    n: 2
    temperature: 1.0
    max_tokens: 2048
    overridable: [intent, n, additional_context, token_cap]
    base_token_cap: 8000
    cost_hint: "≈ N sonnet turns @ 2k out each (~3–5k tokens per sample)"
    intent_description: >
      Which side to steelman: 'A' or 'B'. Anything else falls through
      verbatim into the prompt and the steelman will pick on its own.
    additional_context_description: >
      Pair + rubric + the pair_notes output, so the steelman sees the
      same context the verdict will. Spliced under {additional_context}.
    # A steelman's job is to argue maximally for one side; global
    # operating_assumptions like "be neutral" would distort that role.
    # Same logic the SubroutineBase docstring flags for critics.
    inherit_assumptions: false

  - kind: freeform_agent
    name: verdict
    description: |
      Stage 3 of 3 (pair_notes → steelman → verdict).
      Inputs: pair + rubric + pair_notes + both steelmans in additional_context.
      Output: verdict text ending with one of the 7 canonical preference
      labels on its own line (validator retries on non-canonical labels).
      Use after: this is the deliverable; pass through finalize.
    sys_prompt_path: ../prompts/verdict_judge_sys.md
    user_prompt_template: |
      ## Intent
      {intent}

      ## Pair + rubric + prior stages
      {additional_context}

      Produce the verdict and the 7-point label now.
    model: claude-opus-4-7
    max_rounds: 1
    max_tokens: 4096
    overridable: [intent, additional_context, token_cap]
    base_token_cap: 12000
    cost_hint: "≈ 1 opus turn @ 4k out, +1 retry on label miss (~6–14k tokens)"
    intent_description: >
      Optional steering for the verdict (e.g. "weight clarity over
      ambition"). Usually empty — the rubric already specifies criteria.
    additional_context_description: >
      Pair + rubric + pair_notes + both steelmans. The verdict reads all
      of this before producing the label. Spliced under {additional_context}.
    # Retry if the verdict response doesn't end with a canonical label.
    response_validator: extract_preference_not_none
    retry_message_path: ../prompts/verdict_judge_retry.md
    response_max_retries: 2
