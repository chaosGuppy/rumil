# research — SimpleSpine preset for general workspace-grounded research.
#
# Library: workspace_lookup (FreeformAgent with the workspace_search
# tool). Mainline no longer gets a workspace context block in its first
# user turn — it must spawn workspace_lookup when it wants context. This
# keeps the mainline thread compact and lets the lookup curate to what's
# actually relevant.
#
# This is the default preset for non-versus SimpleSpine usage. The
# versus configs (essay_continuation, judge_pair) intentionally omit
# workspace_lookup — versus runs are blind/scoped to the pair or prefix.

name: research
main_model: claude-opus-4-7
main_system_prompt_path: ../prompts/main_default.md
max_parallel_spawns_per_turn: 4
# Server-side compaction (compact_20260112). Once mainline input
# crosses `compaction_trigger_tokens`, the API summarises the prefix
# in a `compaction` block and drops every prior message on subsequent
# turns — system prompt is preserved (cached separately); the original
# first user message is NOT preserved automatically. The default
# instructions prompt (prompts/compaction_default.md, auto-loaded when
# no explicit instructions are set) tells the summariser to preserve
# the scope question, operating_assumptions, durable findings, and any
# in-progress deliverable content verbatim — soft preservation only.
# 400k trigger sized for Opus 4.7's 1M-context window: late enough to
# avoid summarising actively-relevant context, with ~150k headroom
# for compaction overhead + remaining work.
enable_server_compaction: true
compaction_trigger_tokens: 400000

subroutines:
  - kind: freeform_agent
    name: workspace_lookup
    description: |
      Curate workspace pages relevant to a topic.
      Inputs: focused topic / question / claim in intent; optional
      framing in additional_context.
      Output: relevant pages with short IDs and brief framing — drops
      off-topic hits.
      Use after: cite returned page IDs in finalize, or feed them into
      another spawn as additional_context. Cheap; safe to run early to
      seed yourself before any heavier spawn.
    sys_prompt_path: ../prompts/workspace_lookup_sys.md
    user_prompt_template: |
      ## Intent
      {intent}

      ## Additional context
      {additional_context}

      Search the workspace and return the curated context now.
    model: claude-sonnet-4-6
    max_rounds: 4
    max_tokens: 4096
    allowed_tool_names: [workspace_search]
    overridable: [intent, additional_context, token_cap, max_rounds]
    # 80k floor: per-round worst ≈ input(prior turns + tool results ≈
    # 12k after a couple search hits) + max_tokens(4k) ≈ 16k; over 4
    # rounds that's ~64k. 8k caused tokens_exhausted to fire mid-loop
    # and terminate before a usable answer; 80k matches the cross-
    # preset floor.
    base_token_cap: 80000
    cost_hint: "≈ 1–4 turns @ 4k out (~2–10k tokens; depends on how much it searches)"
    intent_description: >
      The topic, question, or claim to search for. Free-form; the agent
      converts it to 1–3 embedding queries.
    additional_context_description: >
      Optional framing, e.g. "rule out X as already-covered" or "focus
      on pages that bear on Y". Spliced under {additional_context}.
