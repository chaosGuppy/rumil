# versus eval config

essays:
  source: forethought
  max_recent: 8          # how many most-recent essays to fetch
  cache_dir: data/essays

prefix:
  n_paragraphs: 3        # show this many opening paragraphs
  include_headers: true  # include a list of remaining section headings in the prompt

completion:
  length_tolerance: 0.10 # target = original remainder word count, allow +/- this fraction
  models:
    - id: google/gemini-3-flash-preview
      temperature: 0.8
      max_tokens: 32000
    - id: openai/gpt-5.4-mini
      temperature: 0.8
      max_tokens: 32000
    - id: openai/gpt-5.4
      temperature: 0.8
      max_tokens: 64000    # reasoning model: reasoning tokens count against this
    # Uncomment for the full matrix run. Each added model re-runs only itself
    # thanks to per-row caching; existing rows stay untouched.
    # - id: anthropic/claude-haiku-4-5
    #   temperature: 0.8
    #   max_tokens: 32000
    # - id: anthropic/claude-opus-4-7
    #   temperature: 0.8
    #   max_tokens: 32000

paraphrasing:
  enabled: true
  models:
    - id: google/gemini-3-flash-preview
      temperature: 0.7
      max_tokens: 32000
    - id: openai/gpt-5.4-mini
      temperature: 0.7
      max_tokens: 32000
    - id: openai/gpt-5.4
      temperature: 0.7
      max_tokens: 64000    # reasoning model: reasoning tokens count against this
    # Mirror this list with the completion models for the full matrix.
    # - id: anthropic/claude-haiku-4-5
    # - id: anthropic/claude-opus-4-7

judging:
  models:                         # OpenRouter judges, used by scripts/run_judgments.py
    - google/gemini-3-flash-preview
    - openai/gpt-5.4-mini
    - openai/gpt-5.4
    # Same list for the judge axis of the gen-model × judge-model matrix:
    # - anthropic/claude-haiku-4-5
    # - anthropic/claude-opus-4-7
  anthropic_models:               # Rumil-style judges (direct Anthropic), used by run_rumil_judgments.py
    - claude-opus-4-7
    - claude-sonnet-4-6
    # - claude-haiku-4-5
  criteria:                       # one judgment per criterion per pair per judge
    - standalone_quality          # blind quality: clearer thinking, better writing
    - informativeness             # which is more informative, all things considered
    - substance_and_bite          # opinionated: rewards concrete non-obvious claims over hedging
  include_human_as_contestant: true
  max_tokens: 64000           # reasoning judges (gpt-5.4) can chew through tokens

storage:
  completions_log: data/completions.jsonl
  judgments_log: data/judgments.jsonl
  paraphrases_log: data/paraphrases.jsonl

ui:
  port: 8765

concurrency: 8           # parallel API calls per runner (Azure rate-limits gpt-5.4 above ~8)
