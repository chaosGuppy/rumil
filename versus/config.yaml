# versus eval config

essays:
  cache_dir: data/essays
  sources:
    - id: forethought
      max_recent: 14
    - id: redwood
      max_recent: 10
    - id: carlsmith
      max_recent: 8
  exclude_ids:
    # Short announcement post, not an essay.
    - carlsmith__leaving-open-philanthropy-going-to-anthropic
    # Body references stripped screenshots of system-card quotes — reader sees
    # "From the Opus 4.6 system card:" followed by missing content.
    - redwood__anthropic-repeatedly-accidentally
    # Near-duplicate topic with the "how-human-like" essay; dropping the
    # transcript version to avoid double-weighting in the eval set.
    - carlsmith__video-and-transcript-of-talk-on-human-like-ness-in-ai-safety
    # Transcript essay — excluded going forward.
    - carlsmith__video-and-transcript-of-talk-on-giving-ais-safe-motivations
    # Listicle of 8 project proposals; continuation = invent next bullet.
    - forethought__concrete-projects-in-agi-preparedness
    # Short meta-intro whose remainder is one-paragraph stubs previewing
    # sibling design-sketch essays — no real continuation target.
    - forethought__design-sketches-for-a-more-sensible-world
    # Tool/benchmark announcement — continuation tests guessing undisclosed
    # benchmark design details, not prose quality.
    - redwood__introducing-linuxarena
    # Quantitative research report; remainder is ROC figures + prompt-dump
    # appendix, not argumentative prose.
    - redwood__logit-rocs-monitor-tpr-is-linear

prefix:
  n_paragraphs: 3        # show this many opening paragraphs
  include_headers: true  # include a list of remaining section headings in the prompt

prefix_variants:
  - id: no_headers
    n_paragraphs: 1
    include_headers: false

completion:
  length_tolerance: 0.10 # target = original remainder word count, allow +/- this fraction
  # Selects which models run completions and which also produce paraphrases.
  # Per-model sampling / thinking / effort live under `models:` below — this
  # list is just identity + the paraphrase-axis toggle.
  models:
    - id: google/gemini-3-flash-preview
      paraphrase: true
    - id: openai/gpt-5.4-mini
      paraphrase: true
    - id: openai/gpt-5.4
      paraphrase: true
    - id: anthropic/claude-sonnet-4-6
    - id: anthropic/claude-opus-4-7
    - id: anthropic/claude-haiku-4-5
    - id: google/gemini-3.1-pro-preview

paraphrasing:
  enabled: true

judging:
  # Default judge list for run_rumil_judgments.py (blind path). claude-* ids
  # route direct to Anthropic; provider-prefixed ids route via OpenRouter.
  # Override per-run with --model.
  models:
    - google/gemini-3-flash-preview
    - openai/gpt-5.4-mini
    - openai/gpt-5.4
    - claude-opus-4-7
    - claude-sonnet-4-6
    # - claude-haiku-4-5
  criteria:                       # one judgment per dimension per pair per judge.
                                  # All judges share the same prompt source at
                                  # src/rumil/prompts/versus-<dimension>.md so
                                  # cross-judge rows are directly comparable on
                                  # the prompt axis.
    - general_quality
  include_human_as_contestant: true
  max_tokens: 64000           # reasoning judges (gpt-5.4) can chew through tokens

# Per-model effective config — what versus actually sends on the wire.
# Source of truth for sampling, thinking block, effort level. Editing
# any entry here forks model_config_hash on subsequent rows; previous
# data stays valid as the prior config. Every model used by
# completion.models or judging.models must have an entry below.
#
# Sampling notes:
# - Anthropic models running adaptive thinking require temperature=null
#   (Anthropic API rejects explicit temp when thinking is on).
# - Opus 4.7 deprecates the temperature param entirely.
#
# Thinking + effort:
# - Anthropic Opus 4.7 / 4.6, Sonnet 4.6 currently get adaptive thinking
#   + effort high/xhigh. Haiku and older Sonnet don't support either.
# - OpenRouter-routed models (gemini, gpt) don't use these blocks.
models:
  google/gemini-3-flash-preview:
    sampling: { temperature: 0, max_tokens: 32000 }
    thinking: null
    effort: null
  openai/gpt-5.4-mini:
    sampling: { temperature: 0, max_tokens: 32000 }
    thinking: null
    effort: null
  openai/gpt-5.4:
    sampling: { temperature: 0, max_tokens: 64000 }   # reasoning model — extra headroom
    thinking: null
    effort: null
  anthropic/claude-haiku-4-5:
    sampling: { temperature: 0, max_tokens: 32000 }
    thinking: null
    effort: null
  anthropic/claude-sonnet-4-6:
    sampling: { temperature: null, max_tokens: 32000 }
    thinking: { type: adaptive }
    effort: high
  anthropic/claude-opus-4-7:
    # 64k headroom: adaptive xhigh thinking ate ~24k on 10k-word
    # forethought continuations, truncating output mid-clause at the
    # old 32k cap. 64k is the Anthropic max for Opus 4.7 and leaves
    # room for both deep thinking and full essay-length output.
    sampling: { temperature: null, max_tokens: 64000 }
    thinking: { type: adaptive, display: summarized }
    effort: xhigh
  google/gemini-3.1-pro-preview:
    sampling: { temperature: 0, max_tokens: 32000 }
    thinking: null
    effort: null
  # Bare-claude judge ids (route_judge_model strips anthropic/ prefix
  # from the equivalent above; included separately so judging.models
  # entries match by exact key).
  claude-haiku-4-5:
    sampling: { temperature: 0, max_tokens: 32000 }
    thinking: null
    effort: null
  claude-sonnet-4-6:
    sampling: { temperature: null, max_tokens: 32000 }
    thinking: { type: adaptive }
    effort: high
  claude-opus-4-7:
    sampling: { temperature: null, max_tokens: 32000 }
    thinking: { type: adaptive, display: summarized }
    effort: xhigh

storage:
  # Completions and judgments live in versus_texts / versus_judgments
  # (Postgres). Only paraphrase rows still use a file log; that code path
  # is dormant for now.
  paraphrases_log: data/paraphrases.jsonl

ui:
  port: 8765

concurrency: 8           # parallel API calls per runner (Azure rate-limits gpt-5.4 above ~8)
