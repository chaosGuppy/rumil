<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}versus{% endblock %}</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #666;
      --bg: #fafaf7;
      --card: #fff;
      --border: #e3e3dd;
      --accent: #ff6f43;
      --accent-dim: #fff1ea;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }
    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      display: flex;
      gap: 20px;
      align-items: baseline;
      flex-wrap: wrap;
      font-size: 14px;
    }
    header a { color: var(--accent); text-decoration: none; }
    header .grow { flex: 1; }
    header .muted { color: var(--muted); }
    main { padding: 24px; max-width: 1600px; margin: 0 auto; }
    h1 { font-weight: 300; font-size: 26px; margin: 0 0 8px; }
    h2 { font-weight: 500; font-size: 16px; margin: 24px 0 8px; }
    button, .btn {
      font: inherit;
      padding: 10px 18px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dim); border-color: var(--accent); }
    button[value="A"], button[value="B"] { font-weight: 600; }
    input[type=text], select, textarea {
      font: inherit;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card);
    }
    .pill {
      display: inline-block;
      padding: 2px 10px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
    }
    details summary { cursor: pointer; color: var(--muted); }
    .muted { color: var(--muted); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .prose { white-space: pre-wrap; font-family: Georgia, "Times New Roman", serif; font-size: 15px; }
    .prose h1, .prose h2, .prose h3 { font-family: inherit; }
    .stack { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .progress { font-variant-numeric: tabular-nums; color: var(--muted); }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
